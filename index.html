<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/style.css">
  
  <title>Frontend Mentor | Social links profile</title>

</head>
<body>
  <main class="card">
    <img src="./assets/images/pfp_bandana1.jpg" alt="Profile picture of Ace Bandura" class="card__image">

    <section class="card__content">

      <h1 class="card__name">Ace Bandura</h1>

      <p class="card__location">Abuja, Nigeria</p>

      <blockquote class="card__bio">"Front-end developer and avid reader."</blockquote>

    </section>
  
    <div class="card__buttons">

      <a href="http://" class="button" target="_blank">Github</a>
      <a href="http://" class="button" target="_blank">Frontend Mentor</a>
      <a href="http://" class="button" target="_blank">LinkedIn</a>
      <a href="http://x.com/AceBandura" class="button" target="_blank" rel="noopener noreferrer">Twitter</a>
      <a href="http://" class="button" target="_blank">Instagram</a>

    </div>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="http://x.com/AceBandura">Bandura</a>.
  </footer>
</body>
</html>
